<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriela's English Journey 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:       #F472B6;
    --pink-light: #FCE7F3;
    --pink-mid:   #FBCFE8;
    --pink-dark:  #BE185D;
    --yellow:     #FBBF24;
    --yellow-light:#FEF9C3;
    --yellow-mid: #FDE68A;
    --yellow-dark:#92400E;
    --white:      #FFFFFF;
    --gray-50:    #FFF8FC;
    --gray-100:   #F3F4F6;
    --gray-400:   #9CA3AF;
    --gray-600:   #4B5563;
    --gray-800:   #1F2937;
    --font-head:  'Nunito', sans-serif;
    --font-body:  'Nunito Sans', sans-serif;
    --radius-md:  14px;
    --radius-lg:  22px;
    --radius-xl:  32px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--gray-50);
    color: var(--gray-800);
    min-height: 100vh;
    padding-bottom: 3rem;
  }

  /* ── HERO ── */
  .hero {
    background: var(--pink-dark);
    padding: 2.5rem 1.5rem 3rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 40px;
    background: var(--gray-50);
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }
  .hero-avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--pink-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    margin: 0 auto 1rem;
    border: 3px solid rgba(255,255,255,0.3);
  }
  .hero-title {
    font-family: var(--font-head);
    font-weight: 900;
    font-size: clamp(24px, 5vw, 36px);
    color: var(--white);
    margin-bottom: 0.25rem;
  }
  .hero-sub {
    font-size: 17px;
    color: #fbb6d0;
    margin-bottom: 1.5rem;
    font-family: var(--font-head);
    font-weight: 700;
  }
  .progress-wrap {
    max-width: 320px;
    margin: 0 auto;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #fbb6d0;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .progress-bar {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    height: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 8px;
    background: var(--yellow);
    border-radius: 20px;
    transition: width 0.6s ease;
  }

  /* ── CONTENT ── */
  .content { max-width: 640px; margin: 0 auto; padding: 2rem 1.25rem 0; }

  /* ── STATS ROW ── */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 2rem;
    justify-content: center;
  }
  .stat-card {
    background: var(--white);
    border-radius: var(--radius-md);
    border: 1.5px solid var(--pink-mid);
    padding: 1rem 2rem;
    text-align: center;
  }
  .stat-num {
    font-family: var(--font-head);
    font-weight: 900;
    font-size: 28px;
    color: var(--pink-dark);
  }
  .stat-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* ── SECTION HEADING ── */
  .section-heading {
    font-family: var(--font-head);
    font-weight: 900;
    font-size: 16px;
    color: var(--gray-800);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── CLASS CARDS ── */
  .classes-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 2rem; }

  .class-card {
    background: var(--white);
    border-radius: var(--radius-lg);
    border: 2px solid var(--pink-mid);
    padding: 1.1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, transform 0.12s, box-shadow 0.15s;
    cursor: pointer;
  }
  .class-card:hover {
    border-color: var(--pink);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(190,24,93,0.08);
  }
  .class-card.locked {
    opacity: 0.5;
    cursor: default;
    pointer-events: none;
  }
  .class-card.locked:hover { transform: none; box-shadow: none; }

  .class-num {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--pink-light);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-head);
    font-weight: 900;
    font-size: 16px;
    color: var(--pink-dark);
    flex-shrink: 0;
  }
  .class-num.done { background: var(--pink-dark); color: var(--white); }
  .class-num.current { background: var(--yellow); color: var(--yellow-dark); }

  .class-info { flex: 1; min-width: 0; }
  .class-title {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 15px;
    color: var(--gray-800);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .class-meta { font-size: 12px; color: var(--gray-400); font-weight: 600; }

  .class-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-done { background: var(--pink-light); color: var(--pink-dark); }
  .badge-current { background: var(--yellow-light); color: var(--yellow-dark); }
  .badge-upcoming { background: var(--gray-100); color: var(--gray-400); }

  .class-arrow {
    font-size: 18px;
    color: var(--pink-mid);
    flex-shrink: 0;
  }
  .class-card:hover .class-arrow { color: var(--pink-dark); }

  /* ── VOCABULARY SECTION ── */
  .vocab-box {
    background: var(--white);
    border-radius: var(--radius-lg);
    border: 2px solid var(--yellow-mid);
    padding: 1.25rem;
    margin-bottom: 2rem;
  }
  .vocab-title {
    font-family: var(--font-head);
    font-weight: 900;
    font-size: 14px;
    color: var(--yellow-dark);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 0.75rem;
  }
  .vocab-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 8px;
  }
  .vocab-chip {
    background: var(--yellow-light);
    border: 1.5px solid var(--yellow-mid);
    border-radius: var(--radius-md);
    padding: 6px 10px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--yellow-dark);
  }
  .vocab-chip span { display: block; font-size: 11px; color: var(--gray-400); font-weight: 400; margin-top: 1px; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    font-size: 12px;
    color: var(--gray-400);
    margin-top: 1rem;
  }
  .footer strong { color: var(--pink-dark); }

  @media (max-width: 480px) {
    .hero { padding: 2rem 1rem 2.5rem; }
    .stats-row { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .stat-num { font-size: 22px; }
    .class-card { padding: 0.9rem 1rem; gap: 0.75rem; }
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-avatar">🦋</div>
  <div class="hero-title">Gabriela's English Journey</div>
  <div class="hero-sub">One class at a time ✨</div>
</div>

<div class="content">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-done">6</div>
      <div class="stat-label">Classes done</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">⭐</div>
      <div class="stat-label">Keep it up!</div>
    </div>
  </div>

  <!-- CLASSES -->
  <div class="section-heading">📚 My classes</div>
  <div class="classes-list" id="classes-list"></div>

  <div class="footer">Made with ❤️ for <strong>Gabriela</strong> · Updated every class</div>

</div>

<script>
// ── EDIT THIS SECTION EACH WEEK ──
const CLASSES = [
  {
    num: 1,
    title: 'Nice to Meet You!',
    date: 'June 22, 2026',
    topics: 'Introductions, favorites, This or That',
    url: 'clase-1/index.html',
    status: 'done',
    color: { bg: '#FCE7F3', border: '#F472B6', text: '#BE185D', num: '#BE185D', numBg: '#FCE7F3' },
  },
  {
    num: 2,
    title: 'My Daily Routine',
    date: 'June 24, 2026',
    topics: 'Routines, present simple, time',
    url: 'clase-2/index.html',
    status: 'done',
    color: { bg: '#D1FAE5', border: '#6EE7B7', text: '#065F46', num: '#065F46', numBg: '#D1FAE5' },
  },
  {
    num: 3,
    title: "Hermione's Secret",
    date: 'June 27, 2026',
    topics: 'He & She routines, third person',
    url: 'clase-3/index.html',
    status: 'done',
    color: { bg: '#EDE9FE', border: '#A78BFA', text: '#6D28D9', num: '#6D28D9', numBg: '#EDE9FE' },
  },
  {
    num: 4,
    title: 'Interview at Hogwarts',
    date: 'June 30, 2026',
    topics: 'I vs She/He, interview, 3rd person production',
    url: 'clase-4/index.html',
    status: 'done',
    color: { bg: '#FEF2F2', border: '#FECACA', text: '#991B1B', num: '#991B1B', numBg: '#FEF2F2' },
  },
  {
    num: 5,
    title: 'A Day at Hogwarts',
    date: 'July 2, 2026',
    topics: 'Hogwarts house, schedule, Dumbledore interview, Daily Prophet',
    url: 'clase-5/index.html',
    status: 'done',
    color: { bg: '#EDE9FE', border: '#C4B5FD', text: '#6D28D9', num: '#6D28D9', numBg: '#EDE9FE' },
  },
  {
    num: 6,
    title: 'Quiz Show!',
    date: 'July 7, 2026',
    topics: 'Vocab, verb forms, 1st person, 3rd person, mixed — 5 rounds',
    url: 'clase-6/index.html',
    status: 'done',
    color: { bg: '#1E1B4B', border: '#818CF8', text: '#818CF8', num: '#F59E0B', numBg: '#1E1B4B' },
  },
  {
    num: 7,
    title: 'At Work!',
    date: 'July 7, 2026',
    topics: 'Jobs & professions, She/He + verb-s, Frida Kahlo reading',
    url: 'clase-7/index.html',
    status: 'current',
    color: { bg: '#FDF6F9', border: '#F0C4D4', text: '#9D4E6E', num: '#9D4E6E', numBg: '#FDF6F9' },
  },
  // ── ADD A NEW LINE HERE EACH WEEK ──
];

// ── END OF EDITABLE SECTION ──

function render() {
  const done = CLASSES.filter(c => c.status === 'done').length;
  document.getElementById('stat-done').textContent = done;

  const list = document.getElementById('classes-list');
  list.innerHTML = '';
  CLASSES.forEach(c => {
    const card = document.createElement('a');
    card.href = c.status !== 'upcoming' ? c.url : '#';
    card.className = 'class-card' + (c.status === 'upcoming' ? ' locked' : '');

    const col = c.color || { bg: '#FCE7F3', border: '#F472B6', text: '#BE185D', num: '#BE185D', numBg: '#FCE7F3' };
    if(c.status !== 'upcoming') {
      card.style.borderColor = col.border;
    }

    const badgeClass = c.status === 'done' ? 'badge-done' : c.status === 'current' ? 'badge-current' : 'badge-upcoming';
    const badgeText = c.status === 'done' ? '✅ Done' : c.status === 'current' ? '▶ Today' : '🔒 Soon';

    const numStyle = `width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:900;font-size:16px;flex-shrink:0;background:${col.bg};color:${col.num};border:2px solid ${col.border};`;

    card.innerHTML = `
      <div style="${numStyle}">${c.num}</div>
      <div class="class-info">
        <div class="class-title" style="color:${c.status !== 'upcoming' ? col.text : 'var(--gray-400)'};">Class ${c.num} — ${c.title}</div>
        <div class="class-meta">${c.date} · ${c.topics}</div>
      </div>
      <div class="class-badge ${badgeClass}">${badgeText}</div>
      <div class="class-arrow">${c.status !== 'upcoming' ? '→' : ''}</div>
    `;
    list.appendChild(card);
  });
}

render();
</script>
</body>
</html>
